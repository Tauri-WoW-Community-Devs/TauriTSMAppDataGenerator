services:
  app:
    image: ghcr.io/tauri-wow-community-devs/tsm-app-data-generator:latest
    pull_policy: always
    restart: always
    ports:
      - "${SERVER_PORT:-9876}:${SERVER_PORT:-9876}"
    expose:
      - "${SERVER_PORT:-9876}"
    env_file:
      - path: .env.local
        required: false
    environment:
      - API_KEY=${API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - SERVER_PORT=${SERVER_PORT:-9876}
      - NODE_ENV=${NODE_ENV:-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
    volumes:
      - type: tmpfs
        target: /app/.cache
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    healthcheck:
      test:
        ["CMD", "curl", "-f", "http://localhost:${SERVER_PORT:-9876}/health"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
